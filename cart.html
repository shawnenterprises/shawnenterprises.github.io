<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-nav">
    <div class="nav-left">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="lookbook.html">Lookbook</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>

    <div class="nav-center">
      <a href="index.html" class="logo-link">
        <img src="Untitled_Project__3_-removebg-preview.png" alt="Contradict" class="logo">
      </a>
    </div>

    <div class="nav-right">
      <a href="map.html">City Map</a>
      <a href="#registry">Citizen Registry</a>
      <a href="search.html">Search</a>
      <a href="javascript:void(0)" class="cart-link" onclick="openCartDrawer()">
        Cart (<span id="cart-count">0</span>)
      </a>
    </div>
  </header>

  <main class="cart-page">
    <h1>CART</h1>

    <div class="cart-page-header">
      <div>PRODUCT</div>
      <div>QUANTITY</div>
      <div>TOTAL</div>
    </div>

    <div id="cartPageItems"></div>

    <div class="cart-page-footer">
      <p>Total: $<span id="cartPageTotal">0.00</span></p>
      <button onclick="alert('Connect checkout later')">CHECKOUT</button>
    </div>
  </main>

  <div class="cart-overlay" id="cartOverlay" onclick="closeCartDrawer()"></div>
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h2>CART</h2>
      <button class="cart-close" onclick="closeCartDrawer()">×</button>
    </div>

    <div class="shipping-status-wrap">
      <p class="shipping-status-text" id="shippingStatusText"></p>
      <div class="shipping-progress">
        <div class="shipping-progress-bar" id="shippingProgressBar"></div>
      </div>
    </div>

    <p class="cart-preview-note">
  Final size, quantity, and payment are confirmed at secure checkout.
</p>
    
    <div class="cart-drawer-body">
      <div id="cartDrawerItems"></div>
    </div>

    <div class="cart-drawer-footer">
      <p class="cart-tax-note">Taxes &amp; Duties Included</p>
      <a href="https://square.link/u/PNLSZ50P?src=embed" class="checkout-btn">
  CONTNIUE TO SECURE CHECKOUT · $<span id="cartDrawerTotal">0.00</span>
</button>
    </div>
  </aside>

  <script src="cart.js"></script>
</body>
</html>
