<aside class="cart-drawer" id="cartDrawer">

  <!-- HEADER -->
  <div class="cart-header">
    <h2>BAG</h2>
    <button class="cart-close" onclick="closeCartDrawer()">×</button>
  </div>

  <!-- SHIPPING BAR -->
  <div class="cart-shipping">
    <p id="shippingStatusText">Eligible for free shipping</p>
    <div class="shipping-bar">
      <div id="shippingProgressBar"></div>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="cart-items" id="cartDrawerItems">
    <!-- JS injects items here -->
  </div>

  <!-- FOOTER -->
  <div class="cart-footer">

    <p class="cart-note">
      Final product details confirmed at secure checkout.
    </p>

    <div class="cart-total-row">
      <span>Total</span>
      <span id="cartDrawerTotal">$0.00</span>
    </div>

    <a href="https://square.link/u/PNLSZ50P?src=embed" class="checkout-btn">
      CONTINUE TO CHECKOUT
    </a>

  </div>

</aside>

<div class="cart-overlay" id="cartOverlay" onclick="closeCartDrawer()"></div>
