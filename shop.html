<html>
<head>
<title>Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">

<div>
<a href="index.html">Home</a>

</div>

<div class="grid">

<div class="product">
<a href="product.html">
<img src="IMG_2353.PNG">
</a>
<p>RHINESTONE</p>
<p><s>$35</s>
<button class="quick-add">Quick Add</button>
</div>

</div>

<script src="script.js"></script>
  <div class="cart-overlay" id="cartOverlay" onclick="closeCartDrawer()"></div>

<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-header">
    <h2>CART</h2>
    <button class="cart-close" onclick="closeCartDrawer()">×</button>
  </div>

  <div class="shipping-status-wrap">
    <p class="shipping-status-text" id="shippingStatusText">
      SPEND $75 MORE AND GET FREE SHIPPING
    </p>
    <div class="shipping-progress">
      <div class="shipping-progress-bar" id="shippingProgressBar"></div>
    </div>
  </div>

  <div class="cart-drawer-body">
    <div id="cartDrawerItems"></div>

    <div class="cart-divider"></div>

    <div class="more-products-section">
      <h3>MORE PRODUCTS</h3>
      <div class="more-products-list">

        <!-- FUTURE PRODUCT CARD TEMPLATE -->
        <div class="more-product-card">
          <a href="product.html" class="more-product-image-link">
            <img src="your-image.jpg" alt="Product">
          </a>
          <div class="more-product-info">
            <p class="more-product-name">PRODUCT NAME</p>
            <p class="more-product-price">$00.00</p>
          </div>
          <button class="more-product-add">ADD +</button>
        </div>

        <!-- DUPLICATE THIS BLOCK LATER FOR MORE PRODUCTS -->

      </div>
    </div>
  </div>

  <div class="cart-drawer-footer">
    <p class="cart-tax-note">Taxes &amp; Duties Included</p>
    <button class="checkout-btn" onclick="checkout()">
      CHECKOUT · $<span id="cartDrawerTotal">0.00</span>
    </button>
  </div>
</aside>
  <script src="cart.js"></script>
</body>
</html>
